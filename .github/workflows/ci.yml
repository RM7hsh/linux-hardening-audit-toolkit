---
name: CI

on:
  push:
    branches:
      - main
      - develop
      - feature/**
      - fix/**
  pull_request:

jobs:
  lint-and-test:
    name: Lint and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff
          pip install -e .

      - name: Run ruff
        run: ruff check .

      - name: Run tests
        run: pytest -q
